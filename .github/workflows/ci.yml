name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: |
          python3 - << 'PY'
          from pathlib import Path
          text = Path('SKILL.md').read_text(encoding='utf-8')
          if not text.startswith('---\n'):
              raise SystemExit('FAIL: SKILL.md missing YAML frontmatter')
          head = text.split('---\n', 2)[1]
          for key in ('name:', 'description:'):
              if key not in head:
                  raise SystemExit(f'FAIL: SKILL.md frontmatter missing {key}')
          print('SKILL.md frontmatter OK')
          PY

      - name: Validate referenced files exist
        run: |
          python3 - << 'PY'
          from pathlib import Path
          import re, sys

          errors = 0
          files = [Path('SKILL.md'), *Path('references').glob('*.md'), *Path('knowledge').glob('*.md')]
          def strip_fenced_code(text):
              return re.sub(r'```.*?```', '', text, flags=re.S)

          for md in files:
              text = strip_fenced_code(md.read_text(encoding='utf-8'))
              for link in re.findall(r'\]\(([^)]+)\)', text):
                  if link.startswith(('http://', 'https://', '#')):
                      continue
                  target = (md.parent / link).resolve()
                  root_target = Path(link).resolve()
                  if not target.exists() and not root_target.exists():
                      print(f'FAIL: {md} references missing file: {link}')
                      errors += 1
          if errors:
              sys.exit(1)
          print('Referenced files OK')
          PY

      - name: Validate knowledge index and frontmatter
        run: |
          python3 - << 'PY'
          from pathlib import Path
          import json, sys

          index_path = Path('knowledge/index.json')
          if not index_path.is_file():
              raise SystemExit('FAIL: missing knowledge/index.json')
          index = json.loads(index_path.read_text(encoding='utf-8'))
          if not isinstance(index, list):
              raise SystemExit('FAIL: knowledge/index.json must be a list')

          md_files = {p.name for p in Path('knowledge').glob('*.md')}
          indexed = set()
          required = {'file', 'title', 'categories', 'topics', 'signals', 'load_when'}
          errors = 0

          for i, item in enumerate(index):
              if not isinstance(item, dict):
                  print(f'FAIL: index[{i}] is not object')
                  errors += 1
                  continue
              missing = required - set(item)
              if missing:
                  print(f'FAIL: index[{i}] missing keys: {sorted(missing)}')
                  errors += 1
              file_name = item.get('file')
              if file_name not in md_files:
                  print(f'FAIL: index[{i}] file not found: {file_name}')
                  errors += 1
              else:
                  indexed.add(file_name)
              for key in ('categories', 'topics', 'signals'):
                  if not isinstance(item.get(key), list) or not item.get(key):
                      print(f'FAIL: index[{i}].{key} must be non-empty list')
                      errors += 1

          missing_from_index = md_files - indexed
          if missing_from_index:
              print(f'FAIL: markdown files missing from knowledge/index.json: {sorted(missing_from_index)}')
              errors += 1

          for md in sorted(Path('knowledge').glob('*.md')):
              text = md.read_text(encoding='utf-8')
              if not text.startswith('---\n'):
                  print(f'FAIL: {md} missing YAML frontmatter')
                  errors += 1
                  continue
              fm = text.split('---\n', 2)[1]
              for key in ('title:', 'categories:', 'topics:', 'signals:', 'load_when:'):
                  if key not in fm:
                      print(f'FAIL: {md} frontmatter missing {key}')
                      errors += 1

          if errors:
              sys.exit(1)
          print(f'Knowledge index OK: {len(index)} entries')
          PY

      - name: Validate reference files have consistent structure
        run: |
          for ref in references/pwn-agent.md references/web-agent.md references/reverse-agent.md \
                     references/crypto-agent.md references/misc-agent.md references/forensics-agent.md \
                     references/mobile-agent.md; do
            if [ ! -f "$ref" ]; then
              echo "FAIL: Missing specialist reference: $ref"
              exit 1
            fi
            for section in "Mission" "When Selected" "First Pass" "Escalation"; do
              if ! grep -q "## $section\|## .*$section" "$ref"; then
                echo "WARN: $ref missing section '$section'"
              fi
            done
          done
          echo "Reference structure validation OK"

      - name: Validate Python scripts syntax
        run: |
          python3 -m py_compile scripts/AddExp.py scripts/CheckFiles.py scripts/ClearExp.py \
            scripts/DispatchPlan.py scripts/CollectFlags.py scripts/status.py
          if ls scripts/solvers/*.py >/dev/null 2>&1; then
            python3 -m py_compile scripts/solvers/*.py
          fi
          echo "Python syntax OK"

      - name: Validate exp/ JSONL strict schema
        run: |
          python3 scripts/CheckFiles.py . --exp-dir exp --json

      - name: Validate exp guard negative cases
        run: |
          set +e
          python3 scripts/AddExp.py --commit '{"challenge":"Web","name":"GuardTest","technique":"TechniqueName","status":"solved","experience":["这是一条足够长的经验内容用于测试。","这是一条可能包含推测词的经验内容。","这是第三条足够长的经验内容用于测试。"]}' --json > /tmp/addexp-spec.json
          code=$?
          set -e
          test $code -ne 0
          grep -q '未验证推测' /tmp/addexp-spec.json

          set +e
          python3 scripts/AddExp.py --commit '{"challenge":"Web","name":"GuardTest","technique":"TechniqueName","status":"partial","experience":["这是一条足够长的经验内容用于测试。","这是另一条足够长的经验内容用于测试。","这是第三条足够长的经验内容用于测试。"],"artifacts":{"token":"abcdefghijk"}}' --json > /tmp/addexp-token.json
          code=$?
          set -e
          test $code -ne 0
          grep -q '敏感字段' /tmp/addexp-token.json

      - name: Smoke test workflow scripts
        run: |
          tmpdir="$(mktemp -d)"
          mkdir -p "$tmpdir/web/A" "$tmpdir/Web/B" "$tmpdir/reverse/C"
          printf 'FLAG: flag{a}\nSTATUS: solved\nTIMESTAMP: 2026-05-29T00:00:00Z\n' > "$tmpdir/web/A/flag.found"
          printf 'FLAG: flag{b}\nSTATUS: solved\nTIMESTAMP: 2026-05-29T00:00:00Z\n' > "$tmpdir/Web/B/flag.found"

          python3 scripts/DispatchPlan.py "$tmpdir" --exp-dir exp --json > "$tmpdir/dispatch.json"
          python3 - << 'PY' "$tmpdir/dispatch.json"
          import json, sys
          data = json.load(open(sys.argv[1], encoding='utf-8'))
          assert data['summary']['unsolved_count'] == 1, data['summary']
          assert data['summary']['skipped_solved_count'] == 1, data['summary']
          assert data['summary']['invalid_category_dir_count'] == 1, data['summary']
          assert any('Web' in item['path'] for item in data['invalid_category_dirs'])
          assert not any(a['category'] == 'web' for a in data['dispatch_agents'])
          assert any(a['category'] == 're' for a in data['dispatch_agents'])
          PY

          python3 scripts/CollectFlags.py "$tmpdir" --json > "$tmpdir/collect.json"
          grep -q '\[Web\]\[A\] flag{a}' "$tmpdir/flag.log"
          ! grep -q '\[Web\]\[B\] flag{b}' "$tmpdir/flag.log"

          python3 scripts/status.py "$tmpdir" --json > "$tmpdir/status.json"
          python3 -m json.tool "$tmpdir/status.json" >/dev/null

          rm -rf "$tmpdir"
          echo "Workflow scripts smoke test OK"

      - name: Markdown lint basic
        run: |
          for f in SKILL.md references/*.md knowledge/*.md; do
            if grep -Pn '^#{1,6} .*\s+$' "$f"; then
              echo "WARN: Trailing whitespace in headers in $f"
            fi
          done
          echo "Basic markdown lint OK"

      - name: Summary
        run: |
          echo "=== Project Stats ==="
          echo "SKILL.md: $(wc -l < SKILL.md) lines"
          echo "References: $(wc -l references/*.md | tail -1)"
          echo "Knowledge: $(wc -l knowledge/*.md | tail -1)"
          echo "Knowledge index entries: $(python3 - << 'PY'
          import json
          print(len(json.load(open('knowledge/index.json', encoding='utf-8'))))
          PY
          )"
          echo "Total markdown files: $(find . -name '*.md' -not -path './.git/*' | wc -l)"
          echo "Exp entries: $(cat exp/*/*.jsonl 2>/dev/null | wc -l)"
          echo "Solver scripts: $(ls scripts/solvers/*.py 2>/dev/null | wc -l)"
